<!DOCTYPE html>
<html>
<head>
  <title>Customize</title>
  <style>
    body { margin: 0; }

    #car-section {
      width: 100%;
      height: 80vh;
      position: relative;
    }

    #colors {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
    }

    button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="car-section"></div>

<div id="colors">
  <button data-color="#ff0000" style="background:white;"></button>
  <button data-color="#0000ff" style="background:orangered;"></button>
  <button data-color="#000000" style="background:lightblue;"></button>
  <button data-color="#ffffff" style="background:pink;"></button>
</div>

<script type="module" src="customize.js"></script>
</body>
</html>
