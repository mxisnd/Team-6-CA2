<!DOCTYPE html>
<html>

  <head>
        <title>MC20</title>
        <link rel="stylesheet" href="preorder.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>

  <body>
      <div class = "preorder_container">
          <img id = "preorder_logo" src = "images/Preorder_Image.webp"></img>

      <div class = "preorder_text">
        <h1><i>Preorder the MC20</i></h1>
        </div>
      </div>

    <form id="order-form" action="/submit_page" method="POST">
        <h2>Order Details</h2>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <button type="submit">Submit</button>
    </form>

    <div class="form-section">
        <label class="section-label">Current Address</label>
        <input type="text" class="full-width" placeholder="Street Address">
        <input type="text" class="full-width" placeholder="Street Address Line 2">
        <div class="form-row">
            <div class="form-group">
                <label>City</label>
                <input type="text">
            </div>
            <div class="form-group">
                <label>State / Province</label>
                <input type="text">
            </div>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="gurt@gmail.com">
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="(+65) 0000 0000">
        </div>
    </div>

    <div class="form-section">
        <label>Credit Card Number</label>
        <input type="text" class="full-width" placeholder="•••• •••• •••• ••••">
        <div class="form-row">
            <div class="form-group">
                <label>Card Expiration</label>
                <input type="text" placeholder="MM / YY">
            </div>
            <div class="form-group">
                <label>Security Code</label>
                <input type="text" placeholder="CVC">
            </div>
        </div>
    </div>

    <button type="submit" class="submit-btn">Complete Pre-order</button>
</form>

  </body>

</html>
